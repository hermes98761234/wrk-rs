name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: wrk

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            bin_ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: false
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            bin_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
            bin_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            bin_ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }} -p wrk
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p wrk
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.bin_ext }} || true
      - name: Rename binary
        shell: bash
        run: |
          mv "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.bin_ext }}" \
             "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}-${{ matrix.target }}${{ matrix.bin_ext }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BIN_NAME }}-${{ matrix.target }}${{ matrix.bin_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ${{ env.BIN_NAME }}-* > SHA256SUMS.txt
      - name: Detect pre-release
        id: prerelease
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if echo "$TAG" | grep -qE '-(beta|alpha|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate release notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            if [ -n "$PREV" ]; then
              echo "## Changes since $PREV"
              git log --oneline --no-decorate "${PREV}..HEAD"
            else
              echo "## Initial Release"
              git log --oneline --no-decorate -20
            fi
          } > RELEASE_NOTES.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            artifacts/${{ env.BIN_NAME }}-*
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
